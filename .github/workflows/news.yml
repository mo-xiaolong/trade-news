name: Trade News Update

on:
  schedule:
    # 每整点更新网站（UTC时间，北京时间同)
    - cron: '0 * * * *'
    # 每天 UTC 0:00 = 北京时间 8:00，更新网站 + 推送微信
    - cron: '0 0 * * *'
  # 允许手动触发
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate site and optionally push to WeChat
        env:
          SCT_KEY: ${{ secrets.SCT_KEY }}
          SITE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
          # 当 cron 是 '0 0 * * *'（北京时间8:00）时推送微信
          PUSH_WECHAT: ${{ github.event.schedule == '0 0 * * *' }}
        run: python generate.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto update $(date -u '+%Y-%m-%d %H:%M') UTC"
            git push
            echo "Changes pushed successfully"
          fi
